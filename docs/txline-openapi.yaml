  /api/scores/stat-validation:
    get:
      tags:
      - Scores
      summary: Get a Merkle proof for fixture statistics
      description: "This endpoint provides a deep cryptographic proof for statistics\
        \ within a single scores update. \nThe TxODDS Oracle data is structured in\
        \ a three-level Merkle hierarchy:\n\n1. A main batch contains summaries for\
        \ multiple fixtures.\n2. Each fixture summary is the root of a sub-tree of\
        \ all score update events for that fixture.\n3. Each score update event is\
        \ the root of a sub-tree of all the individual statistics it contains.\n\n\
        This endpoint returns the full set of proofs needed to connect the stat(s)\
        \ all the way to the main batch root published on-chain.\n\n### Request Modes\n\
        The endpoint supports two mutually exclusive request formats:\n\n* **Legacy\
        \ Mode (`statKey`, `statKey2`)**: Returns a `ScoresStatValidation` payload\
        \ containing proofs for one or two specific statistics.\n* **V2 Mode (`statKeys`)**:\
        \ Accepts a comma-separated list of keys and returns a `ScoresStatValidationV2`\
        \ payload supporting dynamic N-dimensional proofs across any number of requested\
        \ statistics.\n\n### On-Chain Execution\nWith the returned data, the user\
        \ can execute an on-chain transaction to validate that a supplied strategy\
        \ holds against the extracted stats. \nFor example, validating that a team's\
        \ score exceeded a threshold, or that the difference between two scores meets\
        \ a specific binary condition.\n"
      operationId: getApiScoresStat-validation
      parameters:
      - name: Authorization
        in: header
        description: Bearer token for the user's session JWT.
        required: true
        schema:
          type: string
      - name: X-Api-Token
        in: header
        description: The user's long-lived API token.
        required: true
        schema:
          type: string
      - name: fixtureId
        in: query
        description: The ID of the fixture for the scores event.
        required: true
        schema:
          type: integer
          format: int32
      - name: seq
        in: query
        description: The sequence number of the specific scores event within the fixture's
          history.
        required: true
        schema:
          type: integer
          format: int32
      - name: statKey
        in: query
        description: 'Legacy Mode: The key identifying the specific statistic to validate
          (e.g., 1 for ''Participant1_Score'').'
        required: false
        schema:
          type: integer
          format: int32
      - name: statKey2
        in: query
        description: 'Legacy Mode: The key identifying an optional second statistic
          to validate for two-stat predicates.'
        required: false
        schema:
          type: integer
          format: int32
      - name: statKeys
        in: query
        description: 'V2 Mode: Comma-separated list of stat keys used in N-stat validation
          strategies.'
        required: false
        schema:
          type: string
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                anyOf:
                - $ref: '#/components/schemas/ScoresStatValidation'
                - $ref: '#/components/schemas/ScoresStatValidationV2'
        '400':
          description: 'Invalid value for: header Authorization, Invalid value for:
            header X-Api-Token, Invalid value for: query parameter fixtureId, Invalid
            value for: query parameter seq, Invalid value for: query parameter statKey,
            Invalid value for: query parameter statKey2'
          content:
            text/plain:
              schema:
                type: string
        '401':
          description: 'Authorization failed: Invalid or expired guest JWT'
          content:
            text/plain:
              schema:
                type: string
        '403':
          description: 'Access denied: Invalid API token or insufficient permissions'
          content:
            text/plain:
              schema:
                type: string
        '500':
          description: Internal server error
          content:
            text/plain:
              schema:
                type: string
      security:
      - httpAuth: []
        apiKeyAuth: []
