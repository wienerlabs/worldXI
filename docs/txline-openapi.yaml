openapi: 3.1.0
info:
  title: TxLINE off-chain API for the Hybrid on-chain/off-chain TxODDS Data system
  version: 1.5.2
  description: |2

    ## Overview

    This API provides access to real-time and historical sports data from the **TxLINE on-chain/off-chain Data system**.

    It makes proprietary TxODDS available for any funded blockchain users by linking the on-chain `subscribe` transaction by issuing time-limited API tokens.
    - The data is canonicalised so that all fixtures, odds, or scores are provably identifiable and ordered--confirmed by on-chain cryptographic proofs.
    - The data is delivered in a request-response or Server-Sent Events (SSE) streaming form.

    Examples of accessing the accompanying on-chain program are available publicly at: https://txline.txodds.com/documentation.
    All data returned by the off-chain API is canonicalised such that every single record can be cryptographically proven on-chain to be
    part of the unique and consistent dataset generated by the TxODDS Data system.

    ## Key features

    * The odds data includes the `Stable Price` demargined prices and percentages, currently for key markets in European football (soccer).
    * **Free subscription option that offers World Cup 2026 odds and off-the-board signals in real-time sampled every 60 seconds**.
    * **Data access paid for by the TxLINE token tethered to USDT ata rate 1 USDT = 1_000 TxLINE tokens** The TxLINE utility token can purchased using the associated Solana program.
    * **Fine-grained service level selection** The user can list the pre-configured **service levels** that either map to pre-defined league bundles or allow custom selecting the leagues explicitly.
     The price also depends on the sampling period for the data.
    * **Maximum subscription option that offers all leagues in real-time**.
    * **Historical Snapshots:** Query the latest state of any market at a specific point in time.
    * **Historical Updates:** Query the updates for any given key such as fixture or market for a given time period.
    * **Live Data Streams:** Real-time, low-latency data feeds using Server-Sent Events (SSE).
    * **On-chain Validation:** Retrieve Merkle proofs to cryptographically verify data against the on-chain held Merkle roots by calling appropriate validate on-chain instructions.

    ## How do the users gain access to off-chain data (see more details and examples at: https://github.com/txodds/tx-on-chain)

    1. For paid service tiers, the user purchases TxODDS TxLINE utility tokens for USDT at a fixed rate using either a script (e.g., calling `purchase_subscription_token_usdt`) or an affiliate website. The tokens are deposited into the user's associated token account. (Note: This step is skipped for the free World Cup tier).
    2. As a guest, with no prior authentication, the user calls the off-chain API at "https://txline.txodds.com/auth/guest/start" (or `txline-dev` for DevNet) to obtain an anonymous JWT with Guest claims. **Please note that the JWT token has 30 days  expiration so if you are issuing calls to the data endpoints beyond 30 days, you should either pre-acquire a new JWT token in time before 30 days expire or respond to the returned HTTP 401 code by reacquiring a fresh JWT token.**
    3. The user creates, signs, and confirms a Solana transaction to the `subscribe` instruction, indicating the duration in weeks (must be a multiple of 4 weeks, e.g. 4, 8, 12) and the chosen service level. The user explicitly acts as the transaction fee payer. For the free tier, the smart contract registers the subscription but charges 0 TxLINE tokens.
    4. The user records the confirmed transaction signature (`txSig`).
    5. The user constructs a strict message binding consisting of the `txSig`, a comma-separated list of selected leagues, and the JWT.
    6. The user cryptographically signs this message using their wallet's secret key to generate a detached signature, which is then Base64-encoded.
    7. The user activates the subscription with the off-chain server at "https://txline.txodds.com/api/token/activate" (or `txline-dev` for DevNet) by posting the `txSig`, the Base64 wallet signature, and the selected leagues array, using the JWT for authorization.
    8. The off-chain server validates the cryptographic proof and entitlements, issuing an appropriate API Token or rejecting the activation with a reason.
    9. The user calls the documented APIs while the subscription is valid, supplying both the JWT and the API Token.
    10. Before the subscription expires, the user may call the `subscribe` instruction again to extend the validity period (by a multiple of 4 weeks, e.g. 4, 8, 12) via the same off-chain activation call. The selected leagues can also be amended.
    11. If the previous subscription has expired, the user can activate a new API Token by repeating the process.
servers:
- url: https://txline.txodds.com
  description: Production TxLINE server
- url: http://txline-dev.txodds.com
  description: Test TxLINE server
paths:
  /auth/guest/start:
    post:
      tags:
      - Authentication
      summary: Start a new guest session
      description: |
        Initiates a new, anonymous guest session and returns a JSON Web Token (JWT).
        This token must be provided as a Bearer token in the Authorization header for subsequent calls,
        such as the token activation endpoint. This JWT token expires after 30 days.
      operationId: postAuthGuestStart
      responses:
        '200':
          description: A JWT for the guest session.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '500':
          description: Returned if an unexpected error occurs during token issuance.
          content:
            text/plain:
              schema:
                type: string
  /api/token/activate:
    post:
      tags:
      - Authentication
      summary: Activate subscription and retrieve API token
      description: |
        Activate a user subscription and issue a long-lived API token.
        Supports three modes based on the on-chain transaction:
        1. Legacy subscriptions (pass empty leagues array).
        2. Standard matrix subscriptions (pass empty leagues array).
        3. Custom matrix subscriptions (pass requested league IDs up to the purchased limit).
        The entire request intent must be cryptographically signed by the user's wallet.
      operationId: postApiTokenActivate
      parameters:
      - name: Authorization
        in: header
        description: Bearer token for the user session JWT.
        required: true
        schema:
          type: string
      requestBody:
        description: The cryptographic payload containing the transaction signature,
          wallet signature, and requested leagues.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActivationPayload'
            example:
              txSig: 5kb6gnsSu1inDF9nCVV3WcgKryyBFGFkrYS28Sp1avS8mq6Xcw6iq3yzkBTjmq8bGptgqYTXPmjyWECzKzUxYG3C
              walletSignature: 2BvM...
              leagues:
              - 501
              - 804
              - 202
        required: true
      responses:
        '200':
          description: The newly generated API token.
          content:
            text/plain:
              schema:
                type: string
              example: txoracle_api_123abc456def
        '400':
          description: 'Invalid value for: header Authorization, Invalid value for:
            body'
          content:
            text/plain:
              schema:
                type: string
        '401':
          description: 'Authorization failed: Invalid or expired guest JWT.'
          content:
            text/plain:
              schema:
                type: string
        '403':
          description: ''
          content:
            text/plain:
              schema:
                type: string
        '500':
          description: ''
          content:
            text/plain:
              schema:
                type: string
      security:
      - httpAuth: []
  /api/guest/purchase/quote:
    post:
      tags:
      - Purchase
      summary: Request a partially signed purchase quote given the wallet public key
        and required TxLINE amount in whole units
      description: |
        Authorize and generate a partially signed Solana transaction for purchasing TxLINE utility tokens.

        **Pricing & Fees:**
        - **Base Rate:** 1,000 TxLINE = 1 USDT
        - **Premium/Markup:** Currently 0% (0 basis points)

        **Prerequisites:**
        - The `buyerPubkey` wallet must hold an active Associated Token Account (ATA) for USDT.
        - The wallet must have a sufficient USDT balance to cover the total quoted cost.

        The response includes a financial breakdown of the exact base cost and any applied premium fees. The returned transaction payload must be signed by the user's wallet before submission.
      operationId: postApiGuestPurchaseQuote
      parameters:
      - name: Authorization
        in: header
        description: Bearer token for the guest session JWT.
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PurchaseQuoteRequest'
            example:
              buyerPubkey: 5kb6gnsSu1inDF9nCVV3WcgKryyBFGFkrYS28Sp1avS8mq6Xcw6iq3yzkBTjmq8bGptgqYTXPmjyWECzKzUxYG3C
              txlineAmount: 50
        required: true
      responses:
        '200':
          description: The partially signed transaction payload alongside the explicit
            USDT fee breakdown.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseQuoteResponse'
              example:
                transactionBase64: AQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAABAA...
                baseUsdtCost: 0.05
                feeUsdtAmount: 0
                totalUsdtCharged: 0.05
        '400':
          description: 'Validation failed: Payload exceeded maximum limits, or the
            buyer''s wallet has insufficient USDT.'
          content:
            text/plain:
              schema:
                type: string
        '401':
          description: 'Authorization failed: Invalid or expired guest JWT.'
          content:
            text/plain:
              schema:
                type: string
        '500':
          description: 'Blockchain error: Failed to derive PDAs or connect to the
            Solana RPC.'
          content:
            text/plain:
              schema:
                type: string
      security:
      - httpAuth: []
  /api/fixtures/snapshot:
    get:
      tags:
      - Fixtures
      summary: Get the latest snapshot of fixtures, optionally starting at or within
        30 days after a given epoch day
      operationId: getApiFixturesSnapshot
      parameters:
      - name: Authorization
        in: header
        description: Bearer token for the user's session JWT.
        required: true
        schema:
          type: string
      - name: X-Api-Token
        in: header
        description: The user's long-lived API token.
        required: true
        schema:
          type: string
      - name: startEpochDay
        in: query
        description: Optional. The day at or within 30 days after which the fixtures
          start. Defaults to the current day in UTC.
        required: false
        schema:
          type: integer
      - name: competitionId
        in: query
        description: Optional. Filter by a specific competition ID.
        required: false
        schema:
          type: integer
          format: int32
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Fixture'
        '400':
          description: 'Invalid value for: header Authorization, Invalid value for:
            header X-Api-Token, Invalid value for: query parameter startEpochDay,
            Invalid value for: query parameter competitionId'
          content:
            text/plain:
              schema:
                type: string
        '401':
          description: 'Authorization failed: Invalid or expired guest JWT'
          content:
            text/plain:
              schema:
                type: string
        '403':
          description: 'Access denied: Invalid API token or insufficient permissions'
          content:
            text/plain:
              schema:
                type: string
        '500':
          description: Internal server error
          content:
            text/plain:
              schema:
                type: string
      security:
      - httpAuth: []
        apiKeyAuth: []
  /api/fixtures/updates/{epochDay}/{hourOfDay}:
    get:
      tags:
      - Fixtures
      summary: Get all fixture updates for a single fixture on a given day
      operationId: getApiFixturesUpdatesEpochdayHourofday
      parameters:
      - name: Authorization
        in: header
        description: Bearer token for the user's session JWT.
        required: true
        schema:
          type: string
      - name: X-Api-Token
        in: header
        description: The user's long-lived API token.
        required: true
        schema:
          type: string
      - name: epochDay
        in: path
        description: The day since the Unix epoch
        required: true
        schema:
          type: integer
      - name: hourOfDay
        in: path
        description: The hour of the day (0-23)
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: A list of fixture updates. If no updates are found for the
            given parameters, an empty list is returned.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Fixture'
        '400':
          description: 'Invalid value for: header Authorization, Invalid value for:
            header X-Api-Token, Invalid value for: path parameter epochDay, Invalid
            value for: path parameter hourOfDay'
          content:
            text/plain:
              schema:
                type: string
        '401':
          description: 'Authorization failed: Invalid or expired guest JWT'
          content:
            text/plain:
              schema:
                type: string
        '403':
          description: 'Access denied: Invalid API token or insufficient permissions'
          content:
            text/plain:
              schema:
                type: string
        '500':
          description: Internal server error
          content:
            text/plain:
              schema:
                type: string
      security:
      - httpAuth: []
        apiKeyAuth: []
  /api/fixtures/validation:
    get:
      tags:
      - Fixtures
      summary: Get a Merkle proof for a specific fixture update
      description: |
        Each fixture returned or referenced in the TxODDS Oracle API is part of an hourly batch of fixture updates.
        Blockchain holds the Merkle root (ultimate cryptographic containment proof) of each fixture belonging to that batch.
        This endpoint returns the Merkle proof, i.e., the hashes along the branch of the Merkle tree for the batch up to but not inclusive of that Merkle root.
        The user can then call on-chain validation directly to get a cryptographic validation that a given fixture update was published
        by TxODDS as confirmed by the published Merkle root. This on-chain transaction requires the fixture record and the Merkle proof returned here.
      operationId: getApiFixturesValidation
      parameters:
      - name: Authorization
        in: header
        description: Bearer token for the user's session JWT.
        required: true
        schema:
          type: string
      - name: X-Api-Token
        in: header
        description: The user's long-lived API token.
        required: true
        schema:
          type: string
      - name: fixtureId
        in: query
        description: The ID of the fixture to validate.
        required: true
        schema:
          type: integer
          format: int64
      - name: timestamp
        in: query
        description: Optional. A Unix timestamp (ms) to get the validation proof for
          a specific point in time. Defaults to now.
        required: false
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FixtureValidation'
        '400':
          description: 'Invalid value for: header Authorization, Invalid value for:
            header X-Api-Token, Invalid value for: query parameter fixtureId, Invalid
            value for: query parameter timestamp'
          content:
            text/plain:
              schema:
                type: string
        '401':
          description: 'Authorization failed: Invalid or expired guest JWT'
          content:
            text/plain:
              schema:
                type: string
        '403':
          description: 'Access denied: Invalid API token or insufficient permissions'
          content:
            text/plain:
              schema:
                type: string
        '500':
          description: Internal server error
          content:
            text/plain:
              schema:
                type: string
      security:
      - httpAuth: []
        apiKeyAuth: []
  /api/fixtures/batch-validation:
    get:
      tags:
      - Fixtures
      summary: Get a Merkle proof for an entire hourly batch of fixtures
      description: |
        Fixture data is grouped into hourly batches. Each batch is represented by a Merkle Tree, and its root hash is published on-chain.
        This Merkle root is contained within the batch's metadata.

        This endpoint allows you to validate the integrity of the batch metadata itself. It returns the metadata for the specified hourly batch, along with a Merkle proof.

        A user can take this proof and the metadata (which includes the final Merkle root) and use it to verify against a higher-level tree or commitment, thus cryptographically proving the integrity of the entire batch's claimed state.
      operationId: getApiFixturesBatch-validation
      parameters:
      - name: Authorization
        in: header
        description: Bearer token for the user's session JWT.
        required: true
        schema:
          type: string
      - name: X-Api-Token
        in: header
        description: The user's long-lived API token.
        required: true
        schema:
          type: string
      - name: epochDay
        in: query
        description: The day since the Unix epoch for the desired batch.
        required: true
        schema:
          type: integer
      - name: hourOfDay
        in: query
        description: The hour of the day (UTC, 0-23) for the desired batch.
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FixtureBatchValidation'
        '400':
          description: 'Invalid value for: header Authorization, Invalid value for:
            header X-Api-Token, Invalid value for: query parameter epochDay, Invalid
            value for: query parameter hourOfDay'
          content:
            text/plain:
              schema:
                type: string
        '401':
          description: 'Authorization failed: Invalid or expired guest JWT'
          content:
            text/plain:
              schema:
                type: string
        '403':
          description: 'Access denied: Invalid API token or insufficient permissions'
          content:
            text/plain:
              schema:
                type: string
        '500':
          description: Internal server error
          content:
            text/plain:
              schema:
                type: string
      security:
      - httpAuth: []
        apiKeyAuth: []
  /api/odds/snapshot/{fixtureId}:
    get:
      tags:
      - Odds
      summary: Get snapshots of the latest odds for a fixture
      description: Return the latest odds for each unique market line for a given
        fixture. If the 'asOf' parameter is provided, the snapshots are taken at that
        point in time from historical data. Otherwise, it returns the current live
        snapshot if it exists within the current 5-minutes interval.
      operationId: getApiOddsSnapshotFixtureid
      parameters:
      - name: Authorization
        in: header
        description: Bearer token for the user's session JWT.
        required: true
        schema:
          type: string
      - name: X-Api-Token
        in: header
        description: The user's long-lived API token.
        required: true
        schema:
          type: string
      - name: fixtureId
        in: path
        description: The ID of the fixture
        required: true
        schema:
          type: integer
          format: int64
      - name: asOf
        in: query
        description: Optional Unix timestamp (ms) for a historical snapshot. If omitted,
          returns the live snapshot.
        required: false
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OddsPayload'
        '400':
          description: 'Invalid value for: header Authorization, Invalid value for:
            header X-Api-Token, Invalid value for: path parameter fixtureId, Invalid
            value for: query parameter asOf'
          content:
            text/plain:
              schema:
                type: string
        '401':
          description: 'Authorization failed: Invalid or expired guest JWT'
          content:
            text/plain:
              schema:
                type: string
        '403':
          description: 'Access denied: Invalid API token or insufficient permissions'
          content:
            text/plain:
              schema:
                type: string
        '500':
          description: Internal server error
          content:
            text/plain:
              schema:
                type: string
      security:
      - httpAuth: []
        apiKeyAuth: []
  /api/odds/updates/{fixtureId}:
    get:
      tags:
      - Odds
      summary: Get currently live odds updates for a single fixture
      description: Return all available odds offers for a single fixture from the
        current, in-memory 5-minute cache.
      operationId: getApiOddsUpdatesFixtureid
      parameters:
      - name: Authorization
        in: header
        description: Bearer token for the user's session JWT.
        required: true
        schema:
          type: string
      - name: X-Api-Token
        in: header
        description: The user's long-lived API token.
        required: true
        schema:
          type: string
      - name: fixtureId
        in: path
        description: The ID of the fixture to retrieve live updates for
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OddsPayload'
        '400':
          description: 'Invalid value for: header Authorization, Invalid value for:
            header X-Api-Token, Invalid value for: path parameter fixtureId'
          content:
            text/plain:
              schema:
                type: string
        '401':
          description: 'Authorization failed: Invalid or expired guest JWT'
          content:
            text/plain:
              schema:
                type: string
        '403':
          description: 'Access denied: Invalid API token or insufficient permissions'
          content:
            text/plain:
              schema:
                type: string
        '500':
          description: Internal server error
          content:
            text/plain:
              schema:
                type: string
      security:
      - httpAuth: []
        apiKeyAuth: []
  /api/odds/updates/{epochDay}/{hourOfDay}/{interval}:
    get:
      tags:
      - Odds
      summary: Get a json array of all odd updates from a specific historical 5-minute
        interval
      operationId: getApiOddsUpdatesEpochdayHourofdayInterval
      parameters:
      - name: Authorization
        in: header
        description: Bearer token for the user's session JWT.
        required: true
        schema:
          type: string
      - name: X-Api-Token
        in: header
        description: The user's long-lived API token.
        required: true
        schema:
          type: string
      - name: epochDay
        in: path
        description: The day since the Unix epoch
        required: true
        schema:
          type: integer
      - name: hourOfDay
        in: path
        description: The hour of the day (0-23)
        required: true
        schema:
          type: integer
      - name: interval
        in: path
        description: The 0-indexed 5-minute interval within the hour (0-11)
        required: true
        schema:
          type: integer
      - name: fixtureId
        in: query
        description: Optional filter by fixture ID
        required: false
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OddsPayload'
        '400':
          description: 'Invalid value for: header Authorization, Invalid value for:
            header X-Api-Token, Invalid value for: path parameter epochDay, Invalid
            value for: path parameter hourOfDay, Invalid value for: path parameter
            interval, Invalid value for: query parameter fixtureId'
          content:
            text/plain:
              schema:
                type: string
        '401':
          description: 'Authorization failed: Invalid or expired guest JWT'
          content:
            text/plain:
              schema:
                type: string
        '403':
          description: 'Access denied: Invalid API token or insufficient permissions'
          content:
            text/plain:
              schema:
                type: string
        '500':
          description: Internal server error
          content:
            text/plain:
              schema:
                type: string
      security:
      - httpAuth: []
        apiKeyAuth: []
  /api/odds/stream:
    get:
      tags:
      - Odds
      summary: Get a real-time Server-Sent Events stream of odds updates
      description: |
        A long-lived stream of odds updates.

        The stream consists of two types of events:
        1. **Data messages:** These have an `id` in the format `timestamp:index` and `data` containing a JSON object for a single Odds record.
        2. **Heartbeats:** These have an `event` field set to `heartbeat` and may have data like `{"Ts": 12345}`.
      operationId: getApiOddsStream
      parameters:
      - name: Authorization
        in: header
        description: Bearer token for the user's session JWT.
        required: true
        schema:
          type: string
      - name: X-Api-Token
        in: header
        description: The user's long-lived API token.
        required: true
        schema:
          type: string
      - name: fixtureId
        in: query
        description: Optional. Filter the event stream for a single fixture ID.
        required: false
        schema:
          type: integer
          format: int64
      - name: Last-Event-ID
        in: header
        description: Optional. The ID of the last event received, to resume the stream.
        required: false
        schema:
          type: string
      responses:
        '200':
          description: ''
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/OddsStreamEvent'
        '400':
          description: 'Invalid value for: header Authorization, Invalid value for:
            header X-Api-Token, Invalid value for: query parameter fixtureId'
          content:
            text/plain:
              schema:
                type: string
        '401':
          description: 'Authorization failed: Invalid or expired guest JWT'
          content:
            text/plain:
              schema:
                type: string
        '403':
          description: 'Access denied: Invalid API token or insufficient permissions'
          content:
            text/plain:
              schema:
                type: string
        '500':
          description: Internal server error
          content:
            text/plain:
              schema:
                type: string
      security:
      - httpAuth: []
        apiKeyAuth: []
  /api/odds/validation:
    get:
      tags:
      - Odds
      summary: Get a Merkle proof for a specific odds update
      description: |
        Each odds update is part of a batch whose state is committed to the blockchain via a Merkle root.
        This endpoint returns the cryptographic proof for a single odds update, identified by its unique messageId.
        The proof consists of the hashes along the branch of the Merkle tree, which can be used to reconstruct the root.
        A user can then use this proof and the odds record in an on-chain transaction to cryptographically verify that the odds update was
        published by the TxODDS Oracle as confirmed by the on-chain Merkle root.
      operationId: getApiOddsValidation
      parameters:
      - name: Authorization
        in: header
        description: Bearer token for the user's session JWT.
        required: true
        schema:
          type: string
      - name: X-Api-Token
        in: header
        description: The user's long-lived API token.
        required: true
        schema:
          type: string
      - name: messageId
        in: query
        description: The unique message ID of the odds update to validate.
        required: true
        schema:
          type: string
